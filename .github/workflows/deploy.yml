name: Build and Deploy to FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}

      - name: Inject secrets into .htaccess
        run: |
          sed -i 's|__RECAPTCHA_API_KEY__|${{ secrets.RECAPTCHA_API_KEY }}|g' dist/.htaccess
          sed -i 's|__RECAPTCHA_SITE_KEY__|${{ secrets.RECAPTCHA_SITE_KEY }}|g' dist/.htaccess
          sed -i 's|__RECAPTCHA_PROJECT_ID__|${{ secrets.RECAPTCHA_PROJECT_ID }}|g' dist/.htaccess

      - name: Assemble staging directory
        run: |
          mkdir -p _staging/php
          cp -r dist/* _staging/
          cp -r php/* _staging/php/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: _staging/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
